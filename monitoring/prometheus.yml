# Prometheus scrape configuration for the distributed KV store cluster.
# Targets all 3 KV nodes on their /metrics endpoint.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "kv-store"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "node-0:8000"
          - "node-1:8001"
          - "node-2:8002"
        labels:
          cluster: "kv-cluster"
